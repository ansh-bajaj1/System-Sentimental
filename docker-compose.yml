version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: sentinel-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:alpine
    container_name: sentinel-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: sentinel-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/system_sentinel
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_system_sentinel_key_987654321
      - JWT_EXPIRE=24h
      - LOG_LEVEL=info
      - LOG_FILE_PATH=logs/application.log
    volumes:
      - backend-logs:/app/logs
    depends_on:
      - mongodb
      - redis

  frontend:
    build: ./frontend
    container_name: sentinel-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: sentinel-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: sentinel-grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mongo-data:
  grafana-data:
  backend-logs:
